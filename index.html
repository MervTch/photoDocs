<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SPES Photo Documentation — Mervin Caranto</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', sans-serif;
      --bg-color: #ffffff;
      --bg-secondary: #f9fafb;
      --text-primary: #111827;
      --text-secondary: #4b5563;
      --text-tertiary: #6b7280;
      --border-color: #e5e7eb;
      --border-hover: #d1d5db;
      --accent-bg: #000000;
      --accent-text: #ffffff;
      --card-bg: #ffffff;
      background-color: var(--bg-color);
      color: var(--text-primary);
      min-height: 100vh;
      transition: background-color 0.3s ease, color 0.3s ease;
    }

    body.dark-mode {
      --bg-color: #111827;
      --bg-secondary: #1f2937;
      --text-primary: #f9fafb;
      --text-secondary: #d1d5db;
      --text-tertiary: #9ca3af;
      --border-color: #374151;
      --border-hover: #4b5563;
      --accent-bg: #ffffff;
      --accent-text: #000000;
      --card-bg: #1f2937;
    }

    .container { max-width: 1280px; margin: 0 auto; padding: 0 16px; position: relative; }

    /* ── HEADER ── */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      padding-top: 32px;
      padding-bottom: 24px;
    }

    .profile-section {
      display: flex;
      gap: 16px;
      align-items: center;
      width: 100%;
      padding-right: 56px; /* keep clear of the theme toggle on small screens */
    }

    @media (min-width: 600px) {
      .profile-section { margin-left: clamp(0px, 9.4vw, 120px); padding-right: 0; }
    }

    .profile-image {
      width: clamp(64px, 18vw, 160px);
      height: clamp(78px, 22vw, 170px);
      border-radius: 12px;
      object-fit: cover;
      flex-shrink: 0;
    }

    .profile-details {
      display: flex;
      flex-direction: column;
      gap: 4px;
      justify-content: center;
      min-width: 0; /* allow text to shrink/wrap instead of pushing layout */
      flex: 1;
    }

    .profile-name {
      font-size: clamp(13px, 3vw, 20px);
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 4px;
      color: var(--text-primary);
      white-space: nowrap;
    }

    .verified-icon { width: 1em; height: 1em; color: #3b82f6; flex-shrink: 0; }

    .profile-location {
      font-size: clamp(9px, 2.1vw, 14px);
      color: var(--text-tertiary);
      display: flex;
      align-items: center;
      gap: 4px;
      white-space: nowrap;
    }

    .location-icon { width: 1em; height: 1em; flex-shrink: 0; }

    .profile-title { font-size: clamp(9px, 2.1vw, 14px); font-weight: 500; color: var(--text-secondary); margin-top: 4px; }

    .button-group {
      display: flex;
      flex-wrap: nowrap;
      gap: 6px;
      margin-top: 8px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: clamp(3px, 1vw, 8px);
      padding: clamp(4px, 1.4vw, 8px) clamp(6px, 2.2vw, 16px);
      font-size: clamp(9px, 2vw, 14px);
      font-weight: 500;
      border-radius: clamp(5px, 1.2vw, 8px);
      text-decoration: none;
      transition: all 0.2s ease;
      cursor: pointer;
      white-space: nowrap;
      border: none;
      flex-shrink: 0;
    }

    .btn-primary { background-color: var(--accent-bg); color: var(--accent-text); }
    .btn-primary:hover { opacity: 0.8; }
    .btn-secondary { background-color: transparent; color: var(--text-secondary); border: 1px solid var(--border-color); }
    .btn-secondary:hover { background-color: var(--bg-secondary); border-color: var(--border-hover); }
    .btn-icon { width: 1em; height: 1em; flex-shrink: 0; }

    /* ── DARK MODE TOGGLE ── */
    .theme-toggle-container { position: absolute; right: 12px; top: 24px; }

    .theme-toggle {
      width: 44px; height: 24px;
      background-color: #e5e7eb;
      border-radius: 9999px; border: none; cursor: pointer;
      position: relative; transition: background-color 0.3s ease;
    }

    body.dark-mode .theme-toggle { background-color: #374151; }

    .toggle-knob {
      position: absolute; top: 2px; left: 2px;
      width: 20px; height: 20px;
      background-color: white; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      transition: transform 0.3s ease;
      box-shadow: 0 1px 2px rgba(0,0,0,0.1);
    }

    body.dark-mode .toggle-knob { transform: translateX(20px); }
    .toggle-icon { width: 12px; height: 12px; }
    .sun-icon { color: #f59e0b; display: block; }
    .moon-icon { color: #374151; display: none; }
    body.dark-mode .sun-icon { display: none; }
    body.dark-mode .moon-icon { display: block; }

    /* ── CONTENT ── */
    .content { margin-top: 2px; display: flex; flex-direction: column; gap: 24px; padding-bottom: 48px; }

    .section-card {
      background-color: var(--card-bg);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      padding: 20px;
      transition: background-color 0.3s ease, border-color 0.3s ease;
    }

    .section-title {
      font-size: 16px;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--text-primary);
      margin-bottom: 16px;
    }

    .section-icon { width: 16px; height: 16px; color: var(--text-tertiary); }

    /* ── DAY CARDS ── */
    .days-list { display: flex; flex-direction: column; gap: 12px; }

    .day-card {
      border: 1px solid var(--border-color);
      border-radius: 10px;
      overflow: hidden;
      background-color: var(--card-bg);
      transition: border-color 0.2s ease;
    }

    .day-card:hover { border-color: var(--border-hover); }

    .day-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      cursor: pointer;
      user-select: none;
    }

    .day-header-left { display: flex; align-items: center; gap: 12px; }

    .day-badge {
      background-color: var(--bg-secondary);
      color: var(--text-secondary);
      font-size: 11px;
      font-weight: 700;
      padding: 3px 9px;
      border-radius: 5px;
      border: 1px solid var(--border-color);
      white-space: nowrap;
      letter-spacing: 0.04em;
    }

    .day-title { font-size: 14px; font-weight: 600; color: var(--text-primary); }

    .day-chevron {
      width: 16px; height: 16px;
      color: var(--text-tertiary);
      transition: transform 0.25s ease;
      flex-shrink: 0;
    }

    .day-card.open .day-chevron { transform: rotate(180deg); }

    .day-body {
      display: none;
      padding: 0 16px 16px;
      flex-direction: column;
      gap: 12px;
    }

    .day-card.open .day-body { display: flex; }

    .day-description {
      font-size: 13px;
      line-height: 1.65;
      color: var(--text-secondary);
    }

    /* ── PHOTO GRID ── */
    .photo-grid {
      display: grid;
      gap: 6px;
      grid-template-columns: repeat(2, 1fr);
    }

    @media (max-width: 480px) {
      .photo-grid { grid-template-columns: repeat(2, 1fr); }
    }

    .photo-slot {
      aspect-ratio: 4/3;
      border-radius: 7px;
      overflow: hidden;
      background-color: var(--bg-secondary);
      border: 1px solid var(--border-color);
      cursor: pointer;
      position: relative;
    }

    .photo-slot img {
      width: 100%; height: 100%;
      object-fit: cover;
      transition: transform 0.3s ease;
      display: block;
    }

    .photo-slot:hover img { transform: scale(1.05); }

    .photo-placeholder {
      width: 100%; height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 6px;
      color: var(--text-tertiary);
    }

    .photo-placeholder svg { width: 24px; height: 24px; opacity: 0.4; }
    .photo-placeholder span { font-size: 10px; opacity: 0.5; }

    /* ── LIGHTBOX ── */
    .lightbox {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.92);
      z-index: 999;
      align-items: center;
      justify-content: center;
    }

    .lightbox.open { display: flex; }

    .lightbox img {
      max-width: 90vw;
      max-height: 90vh;
      border-radius: 8px;
      object-fit: contain;
    }

    .lightbox-close {
      position: absolute; top: 16px; right: 20px;
      color: white; font-size: 30px; cursor: pointer;
      background: none; border: none; line-height: 1;
    }
  </style>
</head>
<body>
  <div class="container">

    <!-- ── HEADER ── -->
    <header class="header">
      <div class="profile-section">
        <img src="profile.png" alt="Profile Picture" class="profile-image"/>
        <div class="profile-details">
          <h3 class="profile-name">
            Mervin Caranto
            <svg class="verified-icon" fill="currentColor" viewBox="0 0 20 20">
              <path fill-rule="evenodd" d="M6.267 3.455a3.066 3.066 0 001.745-.723 3.066 3.066 0 013.976 0 3.066 3.066 0 001.745.723 3.066 3.066 0 012.812 2.812c.051.643.304 1.254.723 1.745a3.066 3.066 0 010 3.976 3.066 3.066 0 00-.723 1.745 3.066 3.066 0 01-2.812 2.812 3.066 3.066 0 00-1.745.723 3.066 3.066 0 01-3.976 0 3.066 3.066 0 00-1.745-.723 3.066 3.066 0 01-2.812-2.812 3.066 3.066 0 00-.723-1.745 3.066 3.066 0 010-3.976 3.066 3.066 0 00.723-1.745 3.066 3.066 0 012.812-2.812zm7.44 5.252a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd"/>
            </svg>
          </h3>
          <h5 class="profile-location">
            <svg class="location-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"/>
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"/>
            </svg>
            Capalonga, Camarines Norte
          </h5>
          <h4 class="profile-title">SPES Program · Photo Documentation · 22 Days</h4>
          <div class="button-group">
            <button class="btn btn-primary" onclick="expandAll()">
              <svg class="btn-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 10h16M4 14h16M4 18h16"/>
              </svg>
              Expand All
            </button>
            <button class="btn btn-secondary" onclick="collapseAll()">
              <svg class="btn-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 15l7-7 7 7"/>
              </svg>
              Collapse All
            </button>
          </div>
        </div>
      </div>
    </header>

    <!-- ── DARK MODE TOGGLE ── -->
    <div class="theme-toggle-container">
      <button id="theme-toggle" class="theme-toggle" aria-label="Toggle dark mode">
        <span class="toggle-knob">
          <svg class="toggle-icon sun-icon" fill="currentColor" viewBox="0 0 20 20">
            <path fill-rule="evenodd" d="M10 2a1 1 0 011 1v1a1 1 0 11-2 0V3a1 1 0 011-1zm4 8a4 4 0 11-8 0 4 4 0 018 0zm-.464 4.95l.707.707a1 1 0 001.414-1.414l-.707-.707a1 1 0 00-1.414 1.414zm2.12-10.607a1 1 0 010 1.414l-.706.707a1 1 0 11-1.414-1.414l.707-.707a1 1 0 011.414 0zM17 11a1 1 0 100-2h-1a1 1 0 100 2h1zm-7 4a1 1 0 011 1v1a1 1 0 11-2 0v-1a1 1 0 011-1zM5.05 6.464A1 1 0 106.465 5.05l-.708-.707a1 1 0 00-1.414 1.414l.707.707zm1.414 8.486l-.707.707a1 1 0 01-1.414-1.414l.707-.707a1 1 0 011.414 1.414zM4 11a1 1 0 100-2H3a1 1 0 000 2h1z" clip-rule="evenodd"/>
          </svg>
          <svg class="toggle-icon moon-icon" fill="currentColor" viewBox="0 0 20 20">
            <path d="M17.293 13.293A8 8 0 016.707 2.707a8.001 8.001 0 1010.586 10.586z"/>
          </svg>
        </span>
      </button>
    </div>

    <!-- ── MAIN CONTENT ── -->
    <div class="content">
      <div class="section-card">
        <h3 class="section-title">
          <svg class="section-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"/>
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 13a3 3 0 11-6 0 3 3 0 016 0z"/>
          </svg>
          Daily Photo Documentation
        </h3>
        <div class="days-list" id="days-list"></div>
      </div>
    </div>
  </div>

  <!-- ── LIGHTBOX ── -->
  <div class="lightbox" id="lightbox" onclick="closeLightbox()">
    <button class="lightbox-close">×</button>
    <img id="lightbox-img" src="" alt="">
  </div>

  <script>
    // ── DARK MODE ──
    const body = document.body;
    if (localStorage.getItem('spes-theme') === 'dark') body.classList.add('dark-mode');
    document.getElementById('theme-toggle').addEventListener('click', () => {
      body.classList.toggle('dark-mode');
      localStorage.setItem('spes-theme', body.classList.contains('dark-mode') ? 'dark' : 'light');
    });

    // ── DATA ──
    // To add photos: replace [] with file paths e.g. ["day1a.jpg", "day1b.jpg"]
    // To add a description: edit the text inside each description field
    const days = [
      { title: "Day 1", description: "I prepared and wrote mortality records for the years 2023, 2024, and 2025 based on data from the Municipal Civil Registry (MCR).", photos: ["images/day1.png", "images/dayy1.png"] },
      { title: "Day 2", description: "Write your description here.", photos: [] },
      { title: "Day 3", description: "Write your description here.", photos: [] },
      { title: "Day 4", description: "Write your description here.", photos: [] },
      { title: "Day 5", description: "Write your description here.", photos: [] },
      { title: "Day 6", description: "Write your description here.", photos: [] },
      { title: "Day 7", description: "Write your description here.", photos: [] },
      { title: "Day 8", description: "Write your description here.", photos: [] },
      { title: "Day 9", description: "Write your description here.", photos: [] },
      { title: "Day 10", description: "Write your description here.", photos: [] },
      { title: "Day 11", description: "Write your description here.", photos: [] },
      { title: "Day 12", description: "Write your description here.", photos: [] },
      { title: "Day 13", description: "Write your description here.", photos: [] },
      { title: "Day 14", description: "Write your description here.", photos: [] },
      { title: "Day 15", description: "Write your description here.", photos: [] },
      { title: "Day 16", description: "Write your description here.", photos: [] },
      { title: "Day 17", description: "Write your description here.", photos: [] },
      { title: "Day 18", description: "Write your description here.", photos: [] },
      { title: "Day 19", description: "Write your description here.", photos: [] },
      { title: "Day 20", description: "Write your description here.", photos: [] },
      { title: "Day 21", description: "Write your description here.", photos: [] },
      { title: "Day 22", description: "Write your description here.", photos: [] },
    ];

    // ── RENDER ──
    const list = document.getElementById('days-list');

    days.forEach((day, i) => {
      const card = document.createElement('div');
      card.className = 'day-card';

      // Build photo slots
      const sources = day.photos.length > 0 ? day.photos : [null, null,];
      const photoHTML = sources.map((src, j) => src
        ? `<div class="photo-slot" onclick="openLightbox('${src}')"><img src="${src}" alt="Day ${i+1} photo ${j+1}" loading="lazy"></div>`
        : `<div class="photo-slot"><div class="photo-placeholder"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg><span>Photo</span></div></div>`
      ).join('');

      card.innerHTML = `
        <div class="day-header" onclick="this.parentElement.classList.toggle('open')">
          <div class="day-header-left">
            <span class="day-badge">Day ${i + 1}</span>
            <span class="day-title">${day.title}</span>
          </div>
          <svg class="day-chevron" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/>
          </svg>
        </div>
        <div class="day-body">
          <p class="day-description">${day.description}</p>
          <div class="photo-grid">${photoHTML}</div>
        </div>
      `;
      list.appendChild(card);
    });

    function expandAll()  { document.querySelectorAll('.day-card').forEach(c => c.classList.add('open')); }
    function collapseAll(){ document.querySelectorAll('.day-card').forEach(c => c.classList.remove('open')); }

    // ── LIGHTBOX ──
    function openLightbox(src) {
      document.getElementById('lightbox-img').src = src;
      document.getElementById('lightbox').classList.add('open');
    }
    function closeLightbox() { document.getElementById('lightbox').classList.remove('open'); }
    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeLightbox(); });
  </script>
</body>
</html>
